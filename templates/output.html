<!DOCTYPE html>

<html>
<head>
<title>Prediction Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.container{
background:rgba(255,255,255,0.1);
padding:50px;
border-radius:20px;
width:70%;
max-width:700px;
backdrop-filter:blur(15px);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
color:white;
text-align:center;
animation:fade 1.5s ease;
}

h1{
margin-bottom:20px;
}

.price{
font-size:40px;
font-weight:bold;
margin:25px 0;
background:linear-gradient(45deg,#00f2fe,#4facfe);
-webkit-background-clip:text;
color:transparent;
animation:pop 1s ease;
}

.details{
margin-top:20px;
opacity:0.9;
font-size:16px;
}

button{
margin-top:30px;
padding:14px 40px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
color:white;
font-size:16px;
cursor:pointer;
transition:0.4s;
}

button:hover{
transform:translateY(-5px);
}

@keyframes fade{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}
</style>

</head>

<body>

<div class="container">

<h1>🏠 AI Predicted House Price</h1>

<div class="price">
₹ {{ "{:,.2f}".format(price) }}
</div>

<div class="details">
Based on the provided property features, our trained Machine Learning
model has estimated the above market value.
</div>

<form action="/predict_page">
<button>Predict Another Property</button>
</form>

</div>

</body>
</html>
